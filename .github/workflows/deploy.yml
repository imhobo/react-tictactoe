name: Deploy to droplet

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: droplet
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      - run: |
          npm ci --ignore-scripts
          npm run build
          rm -rf /var/www/webgame/*
          cp -r build/* /var/www/webgame/
          echo "✅ Deployed to tic.babymonks.com"

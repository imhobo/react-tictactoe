when:
  event: push
  branch: main

steps:
  - name: install
    image: bash
    commands:
      - export HOME=/home/ubuntu
      - rm -rf node_modules
      - npm install --prefer-offline --no-audit --no-fund

  - name: build
    image: bash
    commands:
      - npm run build

  - name: artifact
    image: bash
    commands:
      - bash scripts/upload-artifact.sh

  - name: deploy
    image: bash
    commands:
      - echo "Deploying to racknerd..."
      - tar czf /tmp/webgame.tar.gz -C build .
      - hermes-push.sh racknerd /tmp/webgame.tar.gz /tmp/webgame.tar.gz
      - hermes-ssh.sh racknerd "rm -rf /opt/babymonks/webgame/* && tar xzf /tmp/webgame.tar.gz -C /opt/babymonks/webgame/ && rm /tmp/webgame.tar.gz"
      - rm -f /tmp/webgame.tar.gz
      - echo "Deployed to tic.babymonks.com"

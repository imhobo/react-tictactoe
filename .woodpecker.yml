when:
  event: push
  branch: main

steps:
  - name: install
    image: bash
    commands:
      - export HOME=/home/ubuntu
      - rm -rf node_modules
      - npm install --prefer-offline --no-audit --no-fund

  - name: build
    image: bash
    commands:
      - npm run build

  - name: artifact
    image: bash
    commands:
      - export HOME=/home/ubuntu
      - export GITHUB_TOKEN=__gh_pat__
      - ARTIFACT_VERSION="${CI_PIPELINE_NUMBER:-0}-$(date +%Y%m%d)"
      - ARTIFACT_NAME="react-tictactoe-build-${ARTIFACT_VERSION}"
      - ARTIFACT_FILE="${ARTIFACT_NAME}.tar.gz"
      - cd build && tar czf "/tmp/${ARTIFACT_FILE}" .
      - cd /tmp
      - gh release create "${ARTIFACT_NAME}" "/tmp/${ARTIFACT_FILE}#${ARTIFACT_FILE}" --repo imhobo/react-tictactoe --title "Build ${ARTIFACT_VERSION}" --notes "Auto-built from commit ${CI_COMMIT_SHA:-unknown}" --generate-notes 2>/dev/null || gh release upload "${ARTIFACT_NAME}" "/tmp/${ARTIFACT_FILE}#${ARTIFACT_FILE}" --repo imhobo/react-tictactoe --clobber
      - rm -f "/tmp/${ARTIFACT_FILE}"

  - name: deploy
    image: bash
    commands:
      - echo "Deploying to droplet..."
      - tar czf /tmp/webgame.tar.gz -C build .
      - hermes-push.sh droplet /tmp/webgame.tar.gz /tmp/webgame.tar.gz
      - hermes-ssh.sh droplet "rm -rf /var/www/webgame/* && tar xzf /tmp/webgame.tar.gz -C /var/www/webgame/ && rm /tmp/webgame.tar.gz"
      - rm -f /tmp/webgame.tar.gz
      - echo "Deployed to tic.babymonks.com"

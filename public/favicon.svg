<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Board grid lines -->
  <rect x="20" y="2" width="4" height="60" rx="2" fill="#333"/>
  <rect x="40" y="2" width="4" height="60" rx="2" fill="#333"/>
  <rect x="2" y="20" width="60" height="4" rx="2" fill="#333"/>
  <rect x="2" y="40" width="60" height="4" rx="2" fill="#333"/>

  <!-- X (top-left) -->
  <line x1="5" y1="5" x2="17" y2="17" stroke="#E53935" stroke-width="4" stroke-linecap="round"/>
  <line x1="17" y1="5" x2="5" y2="17" stroke="#E53935" stroke-width="4" stroke-linecap="round"/>

  <!-- O (top-right) -->
  <circle cx="51" cy="11" r="9" fill="none" stroke="#1E88E5" stroke-width="4"/>

  <!-- X (center) -->
  <line x1="25" y1="25" x2="37" y2="37" stroke="#E53935" stroke-width="4" stroke-linecap="round"/>
  <line x1="37" y1="25" x2="25" y2="37" stroke="#E53935" stroke-width="4" stroke-linecap="round"/>

  <!-- O (bottom-right) -->
  <circle cx="51" cy="53" r="9" fill="none" stroke="#1E88E5" stroke-width="4"/>

  <!-- X (bottom-left) -->
  <line x1="5" y1="45" x2="17" y2="57" stroke="#E53935" stroke-width="4" stroke-linecap="round"/>
  <line x1="17" y1="45" x2="5" y2="57" stroke="#E53935" stroke-width="4" stroke-linecap="round"/>
</svg>
